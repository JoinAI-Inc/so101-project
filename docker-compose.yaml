services:
  web:
    image: nginx:latest
    ports:
      - 80:80
    volumes:
      - ./docker/data/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - aiservice
    links:
      - aiservice
    
  aiservice:
    #image: aiservice:latest
    build: 
      dockerfile:  ./dockerfile.cuda 
    container_name: aiservice
    ports:
      - 8000:8000
