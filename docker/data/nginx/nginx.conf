upstream aiservice {
        zone upstreams 64K;
        server aiservice:8000 max_fails=1 fail_timeout=2s;
        keepalive 2;
    }
    
server {
        listen 80;
        server_name localhost;
        location / {
            proxy_set_header Host $host;
            proxy_pass http://aiservice;
            proxy_next_upstream error timeout http_500;
        }
    }

