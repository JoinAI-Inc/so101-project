name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    
jobs:
    lint:
        name: lint
        runs-on: ubuntu-latest
        if: github.repository == 'JoinAI-Inc/AI_Service_Template'

        steps:
            - uses: actions/checkout@v4

    
    test:
        name: test
        runs-on: ubuntu-latest
        if: github.repository == 'JoinAI-Inc/AI_Service_Template'
            
        steps:
        - uses: actions/checkout@v4   